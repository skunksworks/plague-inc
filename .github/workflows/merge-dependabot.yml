name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  auto-merge-dependabot:
    if: github.actor == 'dependabot[bot]' || github.actor == 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for 5 minutes (to allow manual review)
        run: sleep 300  # Attend 5 minutes avant de merger

      - name: Enable auto-merge for Dependabot PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Vérifie que la PR est mergeable (pas de conflits)
          MERGEABLE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
            | jq -r '.mergeable')

          if [ "$MERGEABLE" = "true" ]; then
            echo "La PR est mergeable, activation de l'auto-merge..."
            curl -s -X PUT \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/merge" \
              -d '{
                "merge_method": "squash",
                "commit_title": "chore(deps): update dependencies (auto-merged by Dependabot)",
                "commit_message": "Mise à jour automatique des dépendances par Dependabot."
              }'
          else
            echo "La PR n'est pas mergeable (conflits ou autre problème)."
            exit 1
          fi
