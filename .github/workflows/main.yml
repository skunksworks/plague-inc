name: Build and Release Tauri App (Windows & Linux)

on:
  workflow_dispatch:  # Permet de déclencher manuellement depuis l'interface GitHub
  push:
    branches:
      - main  # Déclenche le workflow à chaque push sur main (à adapter si nécessaire)

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  check-release:
    needs: get-version
    runs-on: ubuntu-latest
    outputs:
      release-exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release exists
        id: check
        run: |
          EXISTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ needs.get-version.outputs.version }}" \
            | jq -r '.id != null')
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT

  build-linux:
    needs: [get-version, check-release]
    if: needs.check-release.outputs.release-exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu
          override: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsoup-2.4 libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install project dependencies
        run: npm cache clean --force&&npm install
      - name: install Tauri app (Linux)
        uses: actions-rs/cargo@v1
        with:
          command: install 
          args: --manifest-path=src-tauri/Cargo.toml
      - name: Build Tauri app (Linux)
        uses: actions-rs/cargo@v1
        with:
          command: build 
          args: --manifest-path=src-tauri/Cargo.toml --release --target=x86_64-unknown-linux-gnu

      - name: Prepare Linux artifacts
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb artifacts/myapp_${{ needs.get-version.outputs.version }}_amd64.deb
          cp target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage artifacts/myapp_${{ needs.get-version.outputs.version }}.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-linux
          path: artifacts/

  build-windows:
    needs: [get-version, check-release]
    if: needs.check-release.outputs.release-exists == 'false'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install project dependencies
        run: npm cache clean --force&&npm install

      - name: Build Tauri app (Windows)
        uses: actions-rs/cargo@v1
        with:
          command: build 
          args: --manifest-path=src-tauri/Cargo.toml --release --target=x86_64-pc-windows-msvc

      - name: Prepare Windows artifacts
        run: |
          mkdir -p artifacts
          cp target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi artifacts/myapp_${{ needs.get-version.outputs.version }}_x64.msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-windows
          path: artifacts/

  release:
    needs: [get-version, check-release, build-linux, build-windows]
    if: needs.check-release.outputs.release-exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: Release v${{ needs.get-version.outputs.version }}
          files: |
            artifacts/tauri-app-linux/*
            artifacts/tauri-app-windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
